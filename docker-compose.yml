      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        DEVHUB_ENV: "${DEVHUB_ENV:-development}"
    container_name: devhub_frontend
    ports:
      - "4200:80"
    networks:
      - devhub_net
    restart: unless-stopped

networks:
  devhub_net:
    driver: bridge
    name: devhub_network

volumes:
  sqlserver_data:
