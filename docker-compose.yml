    restart: unless-stopped

  wishlist-service:
    build:
      context: ./services/WishlistService
      dockerfile: Dockerfile
    container_name: devhub_wishlist_service
    environment:
      PORT: "3005"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      SERVICE_NAME: "WishlistService"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=DevHub_MainDB;User Id=sa;Password=${DB_SA_PASSWORD:-DevHub@2025!};TrustServerCertificate=True;"
      Jwt__Secret: "${JWT_SECRET:-dev-secret-key-minimum-32-characters-long!}"
      Jwt__Issuer: "WishlistService"
      Jwt__Audience: "DevHub"
    ports:
      - "3005:3005"
    depends_on:
      sqlserver:
